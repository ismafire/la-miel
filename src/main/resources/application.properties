# App name
spring.application.name=La Miel

# --- H2 in-memory database (no install needed, resets each restart) ---
spring.datasource.url=jdbc:h2:mem:lamieldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create the tables from your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optional: view the database in browser at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port (Render/cloud hosts set PORT automatically; defaults to 8080 locally)
server.port=${PORT:8080}
