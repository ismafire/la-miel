<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>La Miel - Boutique</title>
</head>
<body>

    <header class="shop-header">
        <div class="logo-text">LA <span>MIEL</span></div>
        <div class="header-right">
            <nav>
                <a href="#" class="active" data-filter="all">All</a>
                <a href="#" data-filter="clothing">Clothing</a>
                <a href="#" data-filter="shoes">Shoes</a>
                <a href="#" data-filter="soap">Soap</a>
                <a href="#" data-filter="kitchen">Kitchen</a>
                <a href="#" data-filter="tea">Tea</a>
                <a href="#" data-filter="home">Home</a>
            </nav>
            <div class="cart-indicator">
                Cart (<span th:text="${cartItemsCount}">0</span>) &middot;
                <span th:text="${'$' + #numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</span>
            </div>
        </div>
    </header>

    <section class="category-section"
              th:each="entry : ${categorizedProducts}"
              th:if="${not #lists.isEmpty(entry.value)}"
              th:id="${entry.key}">

        <h2 class="category-title" th:text="${#strings.capitalize(entry.key)}">Category</h2>

        <div class="products-grid">
            <div class="product-card" th:each="product : ${entry.value}">

                <div th:if="${#lists.size(product.imageNames) == 1}" class="product-image-single">
                    <img th:src="@{'/' + ${product.imageNames[0]}}" th:alt="${product.name}">
                </div>

                <div th:if="${#lists.size(product.imageNames) > 1 and #lists.size(product.imageNames) <= 3}"
                     class="product-images-row">
                    <img th:each="imgName : ${product.imageNames}"
                         th:src="@{'/' + ${imgName}}"
                         th:alt="${product.name}">
                </div>

                <div th:if="${#lists.size(product.imageNames) > 3}" class="product-images-scroll">
                    <img th:each="imgName : ${product.imageNames}"
                         th:src="@{'/' + ${imgName}}"
                         th:alt="${product.name}"
                         class="product-image">
                </div>

                <div class="product-info">
                    <h3 th:text="${product.name}">Product Name</h3>
                    <p class="price" th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn-buy">Add</button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <script>
        // Show only the clicked category's section; "All" shows everything again.
        document.addEventListener('DOMContentLoaded', function () {
            var navLinks = document.querySelectorAll('nav a[data-filter]');
            var sections = document.querySelectorAll('.category-section');

            navLinks.forEach(function (link) {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    var filter = link.getAttribute('data-filter');

                    navLinks.forEach(function (l) { l.classList.remove('active'); });
                    link.classList.add('active');

                    sections.forEach(function (section) {
                        if (filter === 'all' || section.id === filter) {
                            section.style.display = '';
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });
        });
    </script>

</body>
</html>
