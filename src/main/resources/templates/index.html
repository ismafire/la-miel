<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>La Miel - Boutique</title>
</head>
<body>
    <div class="bg-container">
        <div class="blur-overlay">

            <header class="shop-header">
                <div class="logo-text">La Miel</div>
                <nav>
                    <a href="#" class="active">All Products</a>
                    <a href="#">Fashion</a>
                    <a href="#">Home &amp; Living</a>
                    <a href="#">Wellness</a>
                </nav>
            </header>

            <main class="products-grid">

                <div class="product-card" th:each="product : ${products}">

                    <div th:class="${#lists.size(product.imageNames) > 3} ? 'product-images-scroll' : 'product-images-row'">
                        <img th:each="imgName : ${product.imageNames}"
                             th:src="@{'/' + ${imgName}}"
                             th:alt="${product.name}"
                             class="product-image">
                    </div>

                    <div class="product-info">
                        <h3 th:text="${product.name}">Product Name</h3>
                        <p class="price" th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <button type="submit" class="btn-buy">Add to Cart</button>
                        </form>
                    </div>

                </div>

            </main>

        </div>
    </div>
</body>
</html>
